//----------------------------------------------------------------------------------------------
// Configuration file for Enhanced Volumetric Lighting and Shadows & NAT.ENB III.1.1

ShadowBehaviour Default =
{
	Day   = SunSync,
	Night = MasserSync
}

MoonPhaseMultipliers Default =
{
	Full = 1.0,
	New  = 0.0
}

//FadeTimePoints Default = auto

      FadeTimePoints Default =
      {
          SunriseFadeOutBegin = 4.0,
          SunriseFadeOutEnd   = 5.0,
          
		  SunriseFadeInBegin  = 7.45,
          SunriseFadeInEnd    = 7.75,


          SunsetFadeOutBegin = 18.0,
          SunsetFadeOutEnd   = 18.3,
          
		  SunsetFadeInBegin  = 20.0,
          SunsetFadeInEnd    = 21.0
      }


PerformancePreset Default = None

float VLMaxRange = 100.0



//----------------------------------------------------------------------------------------------
// Documentation:
//
//   MoonPhaseMultipliers:
//     Moon phase dependant multipliers for both volumetric and direct lighting at night. The
//     'Default'  keyword can also be replaced with a specific lighting type to override its
//     multipliers separately. Values are only used if moon sync is active for the current climate.
//
//
//   ShadowBehaviour:
//     Change default behaviour for the VL/shadow system for each climate. Possible values
//     include SunSync, MasserSync, SecundaSync, Vanilla, ZenithLock or a custom incident vector.
//     This can also be overridden for each climate separately by using its FormID instead of
//     the 'Default' keyword. Both moon sync modes (Masser and Secunda) can fallback to one another
//     in case the target moon isn't available but the other one is.
//     If the sync target and all fallbacks are unavailable the plugin will resort to vanilla behaviour.
//
//     Examples:
//       ShadowBehaviour 0x123456 = ZenithLock
//        -> Will use ZenithLock for all times of day for climate 123456
//
//       ShadowBehaviour 121212 = [ -0.7, -0.2, -0.1 ]
//        -> Will use the custom incident vector for all times of day for climate 121212
//       
//       ShadowBehaviour Default = { Day = SunSync, Night = [ -0.9, -0.05, -0.05 ] }
//        -> Synchronizes shadows to the sun during the day and uses the custom incident
//           vector during night
//       
//       ShadowBehaviour 654321 = { Day = Vanilla }
//        -> Will use the vanilla behaviour during the day for climate 654321 and default
//           behaviour for night time
//
//
//   PerformancePreset:
//     Limits how long the shadows are allowed to be. 'None' means they are free to follow the sun and
//     moons everywhere (default behaviour) while 'Balanced', 'Fast' and 'Faster' limit this
//     progressively more until you get vanilla like shadow angles and performance with 'Fastest'.
//     Tighter limits will reduce sync accuracy by quite a bit, so switch to them only if the performance
//     drop of 'Balanced' or 'None' isn't acceptable.
//
//
//   VLMaxRange:
//     Adjusts the maximum allowed value for the volumetric lighting range parameter (default: 80.0)
//     This tweak is mainly meant for weather mod authors, as it unlocks inputting higher range values
//     into the console using the svlp command.
//
//
//   FadeTimePoints:
//     If you're not familiar with weather or ENB creation leave this section on auto-mode!
//     You can change the fade in/out time points if the automatic values don't work for your weather mod
//     or ENB. Keep in mind that if you move these points too far from their optimal value you can end up
//     with graphical glitches, so adjust everything in here carefully.
//
//     Examples:
//       FadeTimePoints Default =
//       {
//           SunriseFadeOutBegin = 4.0,
//           SunriseFadeOutEnd   = 5.0,
//           SunriseFadeInBegin  = 5.0,
//           SunriseFadeInEnd    = 6.0,
//
//           SunsetFadeOutBegin = 18.0,
//           SunsetFadeOutEnd   = 19.0,
//           SunsetFadeInBegin  = 19.5,
//           SunsetFadeInEnd    = 20.5
//       }
//        -> Sets all fade time points to custom values globally
//
//       FadeTimePoints 123456 = { SunriseFadeOutEnd = 7.0 }
//        -> Overrides the SunriseFadeOutEnd time point for climate 123456 and uses default values
//           for everything else (this means automatic values if defaults haven't been set)
//
