; ═══════════════════════════════════════════════════════════════════════════════
;  WeatherParams.ini — Per-Weather ENB Shader Parameter Overrides
;
;  SkyrimBridge WeatherParameterComputer reads this file and interpolates
;  between weather categories in real-time. Hot-reloadable (edit while playing).
;
;  Format: [shader.fx:ParameterGroup:ParameterName]
;  Categories: Clear, Cloudy, Foggy, Rain, ThunderRain, Snow, Blizzard, Ash, Special
;
;  Optional keys:
;    TransitionSpeed = 1.0     ; Multiplier on weather blend speed
;    MinValue        = 0.0     ; Clamp floor
;    MaxValue        = 10.0    ; Clamp ceiling
;    SmoothLerp      = true    ; Hermite smoothstep (true) vs linear (false)
;    SBParam         = SB_WP_* ; Also push as SkyrimBridge float4 parameter
; ═══════════════════════════════════════════════════════════════════════════════


