;=============================================================================
;  FeedbackConfig.ini — Playground Feedback & ENB Readback Configuration
;
;  [Feedback] — Smoothing parameters for GPU read-back analysis
;  [ENBReadback] — ENBGetParameter slots for cross-shader data sharing
;
;  ENBReadback format: SlotN = shader, paramName, size
;    shader    = ENB shader filename (e.g., enbadaptation.fx)
;    paramName = UIName annotation of the target parameter
;    size      = 4 (float) or 16 (float4)
;
;  Up to 16 readback slots supported. Values available via SB_Computed_*
;  params and in the DebugGUI Subsystems tab.
;=============================================================================

[Feedback]
; EMA smoothing alphas (lower = slower/smoother, higher = faster/noisier)
centerLumAlpha    = 0.05
sceneAvgAlpha     = 0.03
sceneColorAlpha   = 0.08

; Temporal analysis
lumVelocityAlpha  = 0.10
colorShiftAlpha   = 0.10
sceneCutThreshold = 0.30
stabilityWindow   = 300.0

[ENBReadback]
; ── Tier C: Cross-shader ENB parameter readback ──────────────────────────
; These read ENB's own shader parameters back into Playground, enabling
; cross-stage coordination (e.g., bloom shader knowing adaptation value).
;
; NOTE: Parameter names must match the UIName annotation in the target .fx.
; ENB's built-in parameters typically use their HLSL variable name as UIName.
; If a parameter is not found, the slot silently fails (logged once).
;
; Adaptation exposure bias — useful for bloom threshold scaling and tone mapping
Slot0 = enbadaptation.fx, ADAPT | Day - Exposure Bias (log2), 4
; Bloom day intensity — useful for lens flare intensity scaling
Slot1 = enbbloom.fx, BLOOM | Day - Intensity, 4
; Bloom threshold — useful for coordinating bloom across stages
Slot2 = enbbloom.fx, BLOOM | Threshold, 4
