; =============================================================================
;  WriteBackConfig.ini — SkyrimBridge Write-Back Rules
;
;  Each [Rule_N] section maps a data source to a game engine target.
;  Rules are processed in order every frame after feedback collection.
;
;  Targets:
;    CameraFOV, CameraFOV1st, FogNearDist, FogFarDist,
;    SunlightDiffuse_R/G/B, AmbientDiffuse_R/G/B,
;    ActorValue (requires ActorValueId), TimeScale, GameHour
;
;  Sources:
;    Fixed          — constant value from FixedValue key
;    AllDataField   — named field from SkyrimBridge data (e.g. SB_Computed_Luminance.x)
;    ENBReadback    — ENB parameter readback slot by index (from FeedbackConfig.ini)
;
;  Transform keys (all optional, applied in order: scale → offset → clamp → lerp):
;    Scale     = multiply factor (default 1.0)
;    Offset    = additive offset (default 0.0)
;    ClampMin  = minimum output (default -1e30)
;    ClampMax  = maximum output (default 1e30)
;    LerpAlpha = temporal smoothing [0..1], 1.0 = instant (default 1.0)
; =============================================================================

; Example: Adjust world FOV based on scene luminance feedback
; (Bright scenes → slightly wider FOV, dark scenes → narrower)
[Rule_0]
Name=Luminance FOV Adjust
Enabled=false
Target=CameraFOV
Source=AllDataField
SourceField=SB_Computed_Luminance.x
Scale=10.0
Offset=70.0
ClampMin=65.0
ClampMax=85.0
LerpAlpha=0.05

; Example: Set a constant first-person FOV override
[Rule_1]
Name=Fixed 1st Person FOV
Enabled=false
Target=CameraFOV1st
Source=Fixed
FixedValue=80.0

; Example: Drive fog far distance from an ENB readback parameter
[Rule_2]
Name=ENB Fog Override
Enabled=false
Target=FogFarDist
Source=ENBReadback
SourceIndex=0
Scale=1.0
Offset=0.0
ClampMin=500.0
ClampMax=50000.0
LerpAlpha=0.1
