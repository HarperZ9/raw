/////////////////////
//// CAM CONTROL ////
/////////////////////
[CAM]
ToggleKey=117		//F6
Unattach_Player=0	//0=disable, 1=enable	//disabled works like AirBrake (player goes wherever the camera goes), if enabled (unattached) player is independent from camera.
zoom=50			//(1 to 130) this is actually FOV.
rotation=0		//rotation in degrees.
dof_far=23		//(0 to 100) Far distance. higher value = farthest/less visible DoF, lower value = closest/more visible DoF. *differs depending on zoom level.
dof_near=0		//(0 to 10) Near distance. blurs near objects instead of the background, useful when focus on second plane.
speed=0.12		//Cam speed
shake_intensity=1.0	//Cam shake effect intensity
keyForward=0		//0 = default game key to move Forward.
keyBackward=0		//0 = default game key to move Backward.
keyLeft=0		//0 = default game key to move Left.
keyRight=0		//0 = default game key to move Right.
keySpeedUp=0		//0 = default game key to Sprint.
keyUp=38		//Arrow Up	//move up in vertical axis
keyDown=40		//Arrow Down	//move down in vertical axis



